<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>{% block title %}{% endblock %} | MyWatchList</title>
    
    {% block styles %}
    {{ bootstrap.load_css() }}
    <!-- Google Fonts: Outfit for titles, Inter for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
    {% endblock %}
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <a href="{{ url_for('home') }}" class="logo">
          <i class="fa-solid fa-clapperboard logo-icon"></i>MY<span class="highlight">WATCHLIST</span>
        </a>
        <div class="nav-links">
          <a href="{{ url_for('home') }}" class="nav-link"><i class="fa-solid fa-house"></i> Home</a>
          <a href="{{ url_for('add') }}" class="nav-btn"><i class="fa-solid fa-circle-plus"></i> Add Movie</a>
        </div>
      </div>
    </nav>
    <main class="main-content">
      {% block content %}{% endblock %}
    </main>
    <footer class="footer">
      <div class="footer-container">
        <p>&copy; 2026 MyWatchList. Created with <i class="fa-solid fa-heart footer-heart"></i> for premium film logs.</p>
      </div>
    </footer>
  </body>
</html>
